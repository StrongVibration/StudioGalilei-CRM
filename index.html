<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudioGalilie — Relation CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090d;--bg2:#0d1117;--card:#131a24;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.13);
  --text:#e4e2dc;--muted:#5e6370;--dim:#252d3a;
  --b2g:#3b82f6;--b2b:#10b981;--b2c:#f59e0b;--vc:#a855f7;
  --hot:#ef4444;--warm:#f59e0b;--cold:#60a5fa;--dark:#4b5563;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}

/* ── HEADER ── */
header{
  position:fixed;inset:0 0 auto 0;height:50px;z-index:300;
  display:flex;align-items:center;gap:10px;padding:0 1.25rem;
  background:rgba(7,9,13,0.96);backdrop-filter:blur(20px);
  border-bottom:0.5px solid var(--border);
}
.logo{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;letter-spacing:.02em;flex-shrink:0}
.logo em{color:var(--b2g);font-style:normal}
.srch-wrap{flex:1;max-width:380px;margin:0 auto;position:relative}
.srch-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.35;pointer-events:none}
#msearch{width:100%;background:var(--card);border:0.5px solid var(--border);border-radius:8px;padding:6px 10px 6px 32px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none}
#msearch::placeholder{color:var(--muted)}
.hdr-r{display:flex;align-items:center;gap:8px;flex-shrink:0}
.vsep{width:0.5px;height:16px;background:var(--dim)}
.hstat{font-size:11px;color:var(--muted)}.hstat b{color:var(--text);font-weight:500}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--b2b);animation:ld 2s infinite}
@keyframes ld{0%,100%{opacity:1}50%{opacity:.25}}

/* ── FILTER BAR ── */
#catbar{
  position:fixed;top:50px;left:0;right:0;height:38px;z-index:200;
  display:flex;align-items:center;gap:6px;padding:0 1.25rem;
  background:rgba(7,9,13,0.9);backdrop-filter:blur(12px);
  border-bottom:0.5px solid var(--border);overflow-x:auto;
}
#catbar::-webkit-scrollbar{display:none}
.cchip{font-size:11px;font-weight:600;padding:3px 12px;border-radius:14px;cursor:pointer;border:0.5px solid var(--border);background:transparent;color:var(--muted);white-space:nowrap;transition:all .15s;font-family:'DM Sans',sans-serif}
.cchip:hover{color:var(--text)}
.cchip.on{color:#fff}
.cchip[data-c=all].on{background:rgba(255,255,255,.12);border-color:var(--border2)}
.cchip[data-c=HOT].on{background:rgba(239,68,68,.2);border-color:var(--hot);color:#fca5a5}
.cchip[data-c=WARM].on{background:rgba(245,158,11,.2);border-color:var(--warm);color:#fcd34d}
.cchip[data-c=COLD].on{background:rgba(96,165,250,.2);border-color:var(--cold);color:#bfdbfe}
.cchip[data-c=DARK].on{background:rgba(75,85,99,.25);border-color:var(--dark);color:#9ca3af}
.cchip[data-c=NONE].on{background:rgba(37,45,58,.4);border-color:#3a4560;color:#6b7899}
.csep{width:0.5px;height:16px;background:var(--dim);flex-shrink:0}

/* ── STAGE ── */
#stage{position:fixed;inset:88px 0 0 0;overflow:hidden}
#gridbg{position:absolute;inset:0;pointer-events:none}
#connsvg{position:absolute;inset:0;pointer-events:none;overflow:visible}

/* ── BUBBLES ── */
.bub{position:absolute;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:none;will-change:transform;transition:filter .15s}
.bub:hover{filter:brightness(1.15)}
.bub-lbl{font-family:'Syne',sans-serif;font-weight:700;text-align:center;line-height:1.2;pointer-events:none}
.bub-sub{font-size:9px;font-weight:400;font-family:'DM Sans',sans-serif;opacity:.58;pointer-events:none;margin-top:1px;text-align:center}
.bub-cnt{font-size:9px;font-family:'DM Mono',monospace;opacity:.48;pointer-events:none;margin-top:1px}
@keyframes rp{0%{transform:scale(1);opacity:.55}100%{transform:scale(1.65);opacity:0}}
.ring{position:absolute;border-radius:50%;pointer-events:none;animation:rp 2s ease-out infinite;transform-origin:center}

/* ── BREADCRUMB ── */
#bc{
  position:fixed;top:100px;left:50%;transform:translateX(-50%);
  z-index:250;display:flex;align-items:center;gap:5px;
  background:rgba(13,17,23,0.94);backdrop-filter:blur(10px);
  border:0.5px solid var(--border);border-radius:20px;
  padding:5px 16px;font-size:12px;color:var(--muted);white-space:nowrap;max-width:90vw;overflow:hidden;
}
#bc span{cursor:pointer;transition:color .12s;flex-shrink:0}
#bc span:hover{color:var(--text)}
.bcsep{color:var(--dim);cursor:default!important}
.bccur{color:var(--text)!important;font-weight:500}

/* ── LEGEND ── */
#legend{
  position:fixed;bottom:1.2rem;left:1.2rem;z-index:200;
  display:flex;flex-direction:column;gap:4px;
  background:rgba(13,17,23,0.94);backdrop-filter:blur(10px);
  border:0.5px solid var(--border);border-radius:10px;padding:.65rem .9rem;
}
.ltit{font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-bottom:1px}
.lrow{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted)}
.ldotc{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lsep{height:.5px;background:var(--border);margin:3px 0}

/* ── TOOLTIP ── */
#tip{position:fixed;pointer-events:none;z-index:500;background:rgba(10,13,19,.97);border:0.5px solid var(--border2);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--text);white-space:nowrap;opacity:0;transition:opacity .1s}

/* ── DETAIL PANEL ── */
#det{
  position:fixed;right:0;top:50px;bottom:0;width:300px;z-index:400;
  background:rgba(10,14,21,.98);backdrop-filter:blur(20px);
  border-left:0.5px solid var(--border);
  transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;
}
#det.open{transform:translateX(0)}
#det::-webkit-scrollbar{width:3px}
#det::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
.di{padding:1.1rem}
.dcls{float:right;width:26px;height:26px;border-radius:6px;background:var(--card);border:0.5px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px}
.dcls:hover{color:var(--text)}
.dav{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:500;clear:right;margin-bottom:.8rem}
.dname{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;line-height:1.2;margin-bottom:2px}
.dtitle{font-size:11px;color:var(--muted);margin-bottom:2px}
.dorg{font-size:12px;margin-bottom:.8rem}
.tbar{display:flex;gap:4px;align-items:center;margin-bottom:.9rem}
.tbar-d{width:10px;height:10px;border-radius:50%}
.tbar-lbl{font-size:10px;font-weight:700;margin-left:3px;letter-spacing:.04em}
.chips{display:flex;flex-direction:column;gap:5px;margin-bottom:.9rem}
.chip{display:flex;align-items:center;gap:8px;background:var(--card);border:0.5px solid var(--border);border-radius:7px;padding:.5rem .8rem}
.chip-v{font-size:11px;font-family:'DM Mono',monospace;flex:1;color:var(--text)}
.chip-cp{font-size:10px;color:var(--muted);cursor:pointer;padding:1px 6px;border-radius:4px;transition:all .1s}
.chip-cp:hover{background:rgba(255,255,255,.08);color:var(--text)}
.owner-row{display:flex;align-items:center;gap:8px;background:var(--card);border:0.5px solid var(--border);border-radius:7px;padding:.55rem .8rem;margin-bottom:.9rem}
.own-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;background:rgba(59,130,246,.2);color:#93c5fd;flex-shrink:0}
.own-name{font-size:13px;font-weight:500}
.own-lbl{font-size:10px;color:var(--muted);margin-top:1px}
.dseclbl{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
.tl{border-left:1.5px solid var(--dim);padding-left:.85rem;margin-bottom:.9rem}
.tli{position:relative;margin-bottom:.8rem}
.tldot{position:absolute;left:-1.3rem;top:4px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--bg2)}
.tldate{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
.tltype{font-size:9px;font-weight:700;padding:1px 6px;border-radius:5px;display:inline-block;margin-left:5px}
.tltext{font-size:11px;color:var(--text);margin-top:2px;line-height:1.5}
.tlwho{font-size:10px;color:var(--muted);margin-top:1px}
.tlnext{background:rgba(245,158,11,.08);border:0.5px solid rgba(245,158,11,.2);border-radius:6px;padding:.45rem .65rem;font-size:11px;margin-top:4px;color:#fcd34d}
.memo-box{background:var(--card);border:0.5px solid var(--border);border-radius:7px;padding:.6rem .8rem;font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:.9rem}
.add-btn{width:100%;padding:.7rem;border:0.5px dashed var(--border2);border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .15s;margin-top:.5rem}
.add-btn:hover{background:rgba(255,255,255,.05);color:var(--text)}

/* ── SEARCH OVERLAY ── */
#sov{position:fixed;inset:0;z-index:600;background:rgba(4,6,10,.8);backdrop-filter:blur(8px);display:none;align-items:flex-start;justify-content:center;padding-top:10vh}
#sov.open{display:flex}
.sbox{width:100%;max-width:540px;margin:0 1rem;background:#0c1016;border:0.5px solid var(--border2);border-radius:14px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.7)}
.srow{display:flex;align-items:center;gap:10px;padding:.85rem 1.1rem;border-bottom:.5px solid var(--border)}
.srow svg{flex-shrink:0;opacity:.4}
#sinp{flex:1;background:transparent;border:none;outline:none;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--text);caret-color:var(--b2g)}
#sinp::placeholder{color:var(--muted)}
.sesc{font-size:10px;font-family:'DM Mono',monospace;color:var(--dim);background:rgba(255,255,255,.05);border:.5px solid var(--border);border-radius:4px;padding:2px 6px;cursor:pointer;flex-shrink:0}
#sres{max-height:420px;overflow-y:auto}
#sres::-webkit-scrollbar{width:3px}
#sres::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
.sempty{padding:2.5rem;text-align:center;font-size:13px;color:var(--muted)}
.si{display:flex;align-items:center;gap:10px;padding:.6rem 1.1rem;cursor:pointer;transition:background .08s}
.si:hover,.si.foc{background:rgba(255,255,255,.04)}
.si-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.si-info{flex:1;min-width:0}
.si-name{font-size:13px;font-weight:500}
.si-name mark{background:transparent;color:var(--b2g);font-weight:600}
.si-meta{font-size:11px;color:var(--muted);margin-top:1px}
.si-r{flex-shrink:0;font-size:10px;font-weight:700}
.sfoot{border-top:.5px solid var(--border);padding:.45rem 1.1rem;display:flex;gap:10px;font-size:10px;color:var(--dim)}
.sfh{display:flex;align-items:center;gap:3px}
.sfh kbd{font-family:'DM Mono',monospace;background:rgba(255,255,255,.05);border:.5px solid var(--border);border-radius:3px;padding:1px 4px}
</style>
</head>
<body>

<header>
  <div class="logo">Studio<em>Galilie</em> · Relation CRM</div>
  <button id="syncbtn" onclick="syncAndRefresh()" style="font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;border:0.5px solid rgba(59,130,246,.4);background:rgba(59,130,246,.12);color:#93c5fd;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;display:flex;align-items:center;gap:5px;flex-shrink:0">
    <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M14 8A6 6 0 1 1 8 2"/><polyline points="14 2 14 8 8 8"/></svg>
    동기화
  </button>
  <div style="font-size:10px;color:var(--muted);flex-shrink:0" id="syncTime"></div>
  <div class="srch-wrap">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
    <input id="msearch" placeholder="이름, 기관, 지역, 전화번호 검색… ( / )">
  </div>
  <div class="hdr-r">
    <div class="ldot" id="liveDot"></div>
    <div class="hstat"><b id="hHot">0</b> HOT</div>
    <div class="vsep"></div>
    <div class="hstat"><b id="hTotal">0</b> 담당자</div>
  </div>
</header>

<div id="catbar">
  <button class="cchip on" data-c="all" onclick="setCat('all')">전체</button>
  <div class="csep"></div>
  <button class="cchip" data-c="HOT"  onclick="setCat('HOT')">HOT</button>
  <button class="cchip" data-c="WARM" onclick="setCat('WARM')">WARM</button>
  <button class="cchip" data-c="COLD" onclick="setCat('COLD')">COLD</button>
  <button class="cchip" data-c="DARK" onclick="setCat('DARK')">DARK</button>
  <button class="cchip" data-c="NONE" onclick="setCat('NONE')">미접촉</button>
</div>

<div id="stage">
  <svg id="gridbg"></svg>
  <svg id="connsvg"></svg>
</div>

<div id="bc"><span onclick="goRoot()">전체</span></div>

<div id="legend">
  <div class="ltit">카테고리</div>
  <div class="lrow"><div class="ldotc" style="background:var(--b2g)"></div>B2G 공공</div>
  <div class="lrow"><div class="ldotc" style="background:var(--b2b)"></div>B2B 기업</div>
  <div class="lrow"><div class="ldotc" style="background:var(--b2c)"></div>B2C 파트너</div>
  <div class="lrow"><div class="ldotc" style="background:var(--vc)"></div>VC 투자</div>
  <div class="lsep"></div>
  <div class="ltit">관계 온도</div>
  <div class="lrow"><div class="ldotc" style="background:var(--hot)"></div>HOT</div>
  <div class="lrow"><div class="ldotc" style="background:var(--warm)"></div>WARM</div>
  <div class="lrow"><div class="ldotc" style="background:var(--cold)"></div>COLD</div>
  <div class="lrow"><div class="ldotc" style="background:var(--dark)"></div>DARK·미접촉</div>
</div>

<div id="det"><div class="di" id="det-inner"></div></div>
<div id="sov" onclick="if(event.target===this)closeSov()">
  <div class="sbox">
    <div class="srow">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
      <input id="sinp" placeholder="이름, 기관, 지역, 전화, 담당자…" oninput="doSOV()" onkeydown="sovKey(event)" autocomplete="off" spellcheck="false">
      <span class="sesc" onclick="closeSov()">ESC</span>
    </div>
    <div id="sres"></div>
    <div class="sfoot">
      <div class="sfh"><kbd>↑</kbd><kbd>↓</kbd></div>
      <div class="sfh"><kbd>Enter</kbd> 열기</div>
      <div class="sfh"><kbd>ESC</kbd> 닫기</div>
    </div>
  </div>
</div>
<div id="tip"></div>

<script>
// ═══════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════
const TC={HOT:'#ef4444',WARM:'#f59e0b',COLD:'#60a5fa',DARK:'#4b5563',NONE:'#2a3448'};
const RS={HOT:44,WARM:36,COLD:28,DARK:20,NONE:15};
const CAT_COLOR={b2g:'#3b82f6',b2b:'#10b981',b2c:'#f59e0b',vc:'#a855f7'};
const CAT_NAME={b2g:'B2G',b2b:'B2B',b2c:'B2C',vc:'VC'};

// ── B2G 구조 ──────────────────────────────────────────
const MINISTRIES=[
  {id:'molit',name:'국토교통부',sub:'중앙부처'},
  {id:'mafra',name:'농림축산식품부',sub:'중앙부처'},
  {id:'mcst',name:'문화체육관광부',sub:'중앙부처'},
  {id:'me',name:'환경부',sub:'중앙부처'},
];

const REGIONS=[
  {id:'seoul',name:'서울특별시',short:'서울',subs:['종로구','중구','용산구','성동구','광진구','동대문구','중랑구','성북구','강북구','도봉구','노원구','은평구','서대문구','마포구','양천구','강서구','구로구','금천구','영등포구','동작구','관악구','서초구','강남구','송파구','강동구']},
  {id:'busan',name:'부산광역시',short:'부산',subs:['중구','서구','동구','영도구','부산진구','동래구','남구','북구','해운대구','사하구','금정구','강서구','연제구','수영구','사상구','기장군']},
  {id:'daegu',name:'대구광역시',short:'대구',subs:['중구','동구','서구','남구','북구','수성구','달서구','달성군','군위군']},
  {id:'incheon',name:'인천광역시',short:'인천',subs:['중구','동구','미추홀구','연수구','남동구','부평구','계양구','서구','강화군','옹진군']},
  {id:'gwangju',name:'광주광역시',short:'광주',subs:['동구','서구','남구','북구','광산구']},
  {id:'daejeon',name:'대전광역시',short:'대전',subs:['동구','중구','서구','유성구','대덕구']},
  {id:'ulsan',name:'울산광역시',short:'울산',subs:['중구','남구','동구','북구','울주군']},

const SHEET_ID = '1gnxmH5DKv2VNzSZ191gdD3WEBubKA8AGOjOYPnX0drU';

// gviz JSON 파서
function parseGviz(raw){
  try{
    const json=raw.replace(/^[^(]+\(/,'').replace(/\);\s*$/,'');
    const obj=JSON.parse(json);
    const cols=obj.table.cols.map(c=>c.label);
    return (obj.table.rows||[]).map(row=>{
      const r={};
      row.c.forEach((cell,i)=>{r[cols[i]]=cell?(cell.v??cell.f??''):''});
      return r;
    }).filter(r=>Object.values(r).some(v=>v!==''));
  }catch(e){return [];}
}

// Sheets → CONTACTS 구조로 변환
async function loadFromSheets(){
  showSyncStatus('loading');
  try{
    const base=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    const [cRes,tRes]=await Promise.all([
      fetch(base+'&sheet=contacts'),
      fetch(base+'&sheet=touchpoints'),
    ]);
    const cRows=parseGviz(await cRes.text());
    const tRows=parseGviz(await tRes.text());

    // CONTACTS 객체 재구성
    Object.keys(CONTACTS).forEach(k=>delete CONTACTS[k]);
    cRows.forEach(r=>{
      const pid=r.parentId||r.orgId||'';
      if(!pid)return;
      if(!CONTACTS[pid])CONTACTS[pid]=[];
      CONTACTS[pid].push({
        id:r.id||'c_'+Math.random().toString(36).slice(2),
        catId:(r.catId||'b2g').toLowerCase(),
        name:r.name||'',title:r.title||'',
        phone:r.phone||'',email:r.email||'',sns:r.sns||'',
        owner:r.owner||'',
        temp:(r.temp||'NONE').toUpperCase(),
        memo:r.memo||'',
        touches:[],
      });
    });

    // touchpoints 연결
    tRows.forEach(t=>{
      const cid=t.contactId||t.id;
      Object.values(CONTACTS).flat().forEach(c=>{
        if(c.id===cid) c.touches.push({
          date:t.date||'',type:t.type||'',
          who:t.who||'',text:t.text||'',
          next:t.next||'',c:t.color||'#6b6d75',
        });
      });
    });

    updateStats();
    showSyncStatus('done');
    return true;
  }catch(e){
    showSyncStatus('error', e.message);
    return false;
  }
}

function showSyncStatus(state, msg){
  const btn=document.getElementById('syncbtn');
  const dot=document.getElementById('liveDot');
  if(state==='loading'){
    btn.textContent='동기화 중…';btn.disabled=true;
    dot.style.background='var(--warm)';
  }else if(state==='done'){
    btn.textContent='동기화';btn.disabled=false;
    dot.style.background='var(--b2b)';
    const t=document.getElementById('syncTime');
    if(t) t.textContent=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  }else{
    btn.textContent='재시도';btn.disabled=false;
    dot.style.background='var(--hot)';
    console.warn('Sheets 연결 오류:', msg);
  }
}

// ═══════════════════════════════════════════════════════
// ENGINE
// ═══════════════════════════════════════════════════════
let W=0,H=0,bodies=[],raf=null;
let level='root', levelStack=[], catFilter='all';

function getSize(){const r=document.getElementById('stage').getBoundingClientRect();W=r.width||window.innerWidth;H=r.height||(window.innerHeight-88);}
function h2r(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}

class Body{
  constructor(o){Object.assign(this,o);this.vx=(Math.random()-.5)*.5;this.vy=(Math.random()-.5)*.5;this.ph=Math.random()*Math.PI*2;this.el=null;this.ringEl=null;}
}

function makeDom(b){
  const d=document.createElement('div');d.className='bub';
  const r=b.r;
  d.style.cssText=`width:${r*2}px;height:${r*2}px;left:${b.x-r}px;top:${b.y-r}px;`;

  const tc=TC[b.temp]||TC.NONE;
  const BGMAP={HOT:h2r('#ef4444',.16),WARM:h2r('#f59e0b',.14),COLD:h2r('#60a5fa',.13),DARK:h2r('#4b5563',.17),NONE:'rgba(37,45,58,.28)'};

  if(b.kind==='center'){
    const cc=b.catColor||'rgba(255,255,255,.9)';
    d.style.cssText+=`background:radial-gradient(circle at 38% 32%,${h2r(cc,.2)},${h2r(cc,.04)});border:1px solid ${h2r(cc,.35)};box-shadow:0 0 28px ${h2r(cc,.14)};`;
  } else {
    d.style.cssText+=`background:${BGMAP[b.temp]||BGMAP.NONE};border:${b.temp==='HOT'?1.8:1}px solid ${tc};`;
    if(b.temp==='HOT') d.style.cssText+=`box-shadow:0 0 16px ${h2r(tc,.22)};`;
    else if(b.temp==='WARM') d.style.cssText+=`box-shadow:0 0 10px ${h2r(tc,.14)};`;
  }

  const lbl=document.createElement('span');lbl.className='bub-lbl';
  const fs=b.kind==='center'?Math.max(10,Math.min(13,r/4)):Math.max(9,Math.min(12,r/3.2));
  const cc2=b.kind==='center'?(b.catColor||'rgba(200,210,255,.9)'):b.temp==='NONE'?'rgba(100,115,150,.65)':'rgba(228,226,220,.9)';
  const maxch=Math.floor(r/3.4);
  lbl.style.cssText=`font-size:${fs}px;color:${cc2};`;
  lbl.textContent=(b.shortName||b.label).length>maxch?(b.shortName||b.label).slice(0,maxch)+'…':(b.shortName||b.label);
  d.appendChild(lbl);

  if(b.subLabel){const s=document.createElement('span');s.className='bub-sub';s.textContent=b.subLabel;s.style.color=b.kind==='center'?h2r(b.catColor||'#fff',.55):(b.temp==='NONE'?'rgba(80,95,130,.55)':h2r(tc,.55));d.appendChild(s);}
  if(b.cnt>0){const c=document.createElement('span');c.className='bub-cnt';c.textContent=b.cnt+'명';c.style.color=h2r(tc,.48);d.appendChild(c);}

  if(b.temp==='HOT'){
    const ring=document.createElement('div');ring.className='ring';
    ring.style.cssText=`width:${r*2}px;height:${r*2}px;left:${b.x-r}px;top:${b.y-r}px;border:1.5px solid ${tc};`;
    b.ringEl=ring;document.getElementById('stage').appendChild(ring);
  }

  d.addEventListener('mouseenter',e=>showTip(e,b));
  d.addEventListener('mousemove',e=>{const t=document.getElementById('tip');t.style.left=(e.clientX+14)+'px';t.style.top=(e.clientY-10)+'px';});
  d.addEventListener('mouseleave',()=>{document.getElementById('tip').style.opacity='0';});
  d.addEventListener('click',()=>onBubClick(b));
  document.getElementById('stage').appendChild(d);
  b.el=d;
}

function showTip(e,b){
  const t=document.getElementById('tip');
  let txt=b.kind==='center'?b.label+' 전체':b.label+(b.temp&&b.temp!=='NONE'?' · '+b.temp:'')+(b.subLabel?' · '+b.subLabel:'');
  t.textContent=txt;t.style.opacity='1';t.style.left=(e.clientX+14)+'px';t.style.top=(e.clientY-10)+'px';
}

function onBubClick(b){
  closeDet();
  if(b.kind==='center'){if(b.goBack)b.goBack();else goRoot();return;}
  switch(b.action){
    case 'drillCat':drillCat(b.catId);break;
    case 'drillMinistries':drillMinistries();break;
    case 'drillRegion':drillRegion(b.regionId);break;
    case 'drillMinistry':drillMinistry(b.orgId);break;
    case 'drillSub':drillSub(b.subName,b.regionId);break;
    case 'drillOrg':drillOrg(b.orgId,b.catId);break;
    case 'openContact':openDet(b.data,b.parentId,b.catId);break;
    case 'empty':showAddHint(b.label);break;
  }
}

function clearBodies(){
  bodies.forEach(b=>{if(b.el?.parentNode)b.el.parentNode.removeChild(b.el);if(b.ringEl?.parentNode)b.ringEl.parentNode.removeChild(b.ringEl);});
  document.getElementById('connsvg').innerHTML='';bodies=[];
}

function spawnCenter(label,catColor,goBack,subLabel){
  const b=new Body({id:'__c',label,kind:'center',r:54,temp:'NONE',catColor,goBack,subLabel:subLabel||'',cnt:0,x:W/2,y:H/2,vx:0,vy:0});
  bodies.push(b);makeDom(b);
}

function placeRing(items, spread, extra){
  const filt=catFilter==='all'?items:items.filter(it=>it._temp===catFilter)||items;
  const list=filt.length?filt:items;
  list.forEach((it,i)=>{
    const ang=(Math.PI*2/list.length)*i-Math.PI/2;
    const b=new Body({...it,...extra,x:W/2+Math.cos(ang)*spread+(Math.random()-.5)*16,y:H/2+Math.sin(ang)*spread+(Math.random()-.5)*16});
    bodies.push(b);makeDom(b);
  });
}

function drawConns(){
  const svg=document.getElementById('connsvg');svg.innerHTML='';
  const cx=W/2,cy=H/2;
  bodies.forEach(b=>{
    if(b.id==='__c') return;
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',cx);l.setAttribute('y1',cy);l.setAttribute('x2',b.x);l.setAttribute('y2',b.y);
    const col=b.catColor||(TC[b.temp]||TC.NONE);
    l.setAttribute('stroke',col);l.setAttribute('stroke-width','0.5');
    l.setAttribute('stroke-dasharray','3 9');l.setAttribute('opacity','0.15');
    l.dataset.bid=b.id;svg.appendChild(l);
  });
}
function updateConns(){
  const cx=W/2,cy=H/2;
  document.getElementById('connsvg').querySelectorAll('line').forEach(l=>{
    const b=bodies.find(x=>x.id===l.dataset.bid);
    if(!b) return;l.setAttribute('x2',b.x);l.setAttribute('y2',b.y);
  });
}

function getTemp(cts){
  if(!cts||!cts.length) return 'NONE';
  if(cts.some(c=>c.temp==='HOT')) return 'HOT';
  if(cts.some(c=>c.temp==='WARM')) return 'WARM';
  if(cts.some(c=>c.temp==='COLD')) return 'COLD';
  if(cts.some(c=>c.temp==='DARK')) return 'DARK';
  return 'NONE';
}
function orgCnt(keys){return keys.reduce((s,k)=>s+(CONTACTS[k]||[]).length,0);}
function orgTemp(keys){return getTemp(keys.flatMap(k=>CONTACTS[k]||[]));}

  if(catId==='b2g'){
    // B2G: 중앙부처 그룹 + 17 광역시도
    const minT=orgTemp(MINISTRIES.map(m=>m.id));

    const spread=Math.min(W,H)*.33;
    const items=[
      {id:'__ministries_grp',label:'중앙부처',shortName:'중앙부처',subLabel:'4개 부처',cnt:minCnt,temp:minT,_temp:minT,catColor:color,action:'drillMinistries',r:RS[minT]||RS.NONE},
      ...REGIONS.map(r=>{

function setBc(steps){

  bc.innerHTML=steps.map((s,i)=>{
    if(i===steps.length-1) return `<span class="bccur">${s.label}</span>`;

// ── PHYSICS ───────────────────────────────────────────
function tick(){
  const cx=W/2,cy=H/2;
  const orbit=Math.min(W,H)*(bodies.length>20?.38:bodies.length>12?.34:.3);
  bodies.forEach(b=>{
    if(b.id==='__c'||b.kind==='empty'){b.ph+=.015;return;}
    b.ph+=.02;
    const dx=cx-b.x,dy=cy-b.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
    const f=(dist-orbit)*.0025;b.vx+=dx/dist*f;b.vy+=dy/dist*f;
    bodies.forEach(m=>{
      if(m===b)return;
      const ex=b.x-m.x,ey=b.y-m.y,ed=Math.sqrt(ex*ex+ey*ey)||1,md=b.r+m.r+12;
      if(ed<md){const rf=(md-ed)*.032;b.vx+=ex/ed*rf;b.vy+=ey/ed*rf;}
    });
    b.vx*=.83;b.vy*=.83;b.x+=b.vx;b.y+=b.vy;
    const pad=b.r+8;
    if(b.x<pad){b.vx+=.7;b.x=pad;} if(b.x>W-pad){b.vx-=.7;b.x=W-pad;}
    if(b.y<pad+4){b.vy+=.7;b.y=pad+4;} if(b.y>H-pad){b.vy-=.7;b.y=H-pad;}
    if(b.el){b.el.style.left=(b.x-b.r)+'px';b.el.style.top=(b.y-b.r)+'px';}
    if(b.ringEl){b.ringEl.style.left=(b.x-b.r)+'px';b.ringEl.style.top=(b.y-b.r)+'px';}
  });
  updateConns();
}
function frame(){tick();raf=requestAnimationFrame(frame);}
function startAnim(){if(raf)cancelAnimationFrame(raf);raf=requestAnimationFrame(frame);}
function initGrid(){
  const svg=document.getElementById('gridbg');svg.setAttribute('width',W);svg.setAttribute('height',H);
  let h='';
  for(let x=0;x<W;x+=44)h+=`<line x1="${x}" y1="0" x2="${x}" y2="${H}" stroke="white" stroke-width=".35" opacity=".017"/>`;
  for(let y=0;y<H;y+=44)h+=`<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="white" stroke-width=".35" opacity=".017"/>`;
  svg.innerHTML=h;
}

    <div class="dorg" style="color:${color}">${CAT_NAME[catId]} · ${parentId}</div>
    <div class="tbar">${tbarHtml}<span class="tbar-lbl" style="color:${tc}">${c.temp}</span></div>
    <div class="chips">${chips.map(v=>`<div class="chip"><div class="chip-v">${v}</div><div class="chip-cp" onclick="copyVal('${v}')">복사</div></div>`).join('')}</div>
    <div class="owner-row"><div class="own-av">${c.owner?c.owner.slice(0,1):'?'}</div><div><div class="own-name">${c.owner||'미배정'}</div><div class="own-lbl">우리 측 담당자</div></div></div>
    ${c.memo?`<div class="dseclbl">메모</div><div class="memo-box">${c.memo}</div>`:''}
    <div class="dseclbl">연락 히스토리</div><div class="tl">${tlHtml}</div>`;
  document.getElementById('det').classList.add('open');
}
function closeDet(){document.getElementById('det').classList.remove('open');}
function copyVal(v){navigator.clipboard?.writeText(v).catch(()=>{});}
function showAddHint(name){
  document.getElementById('det-inner').innerHTML=`<div class="dcls" onclick="closeDet()">×</div>
    <div style="margin-top:2rem;text-align:center;padding:1rem">
      <div style="font-size:32px;opacity:.2;margin-bottom:1rem">+</div>
      <div class="dname">${name}</div>
      <div class="dtitle" style="margin:.5rem 0 1.5rem">담당자 미등록</div>
      <button class="add-btn" onclick="alert('Google Sheets에 담당자를 추가 후 동기화하세요')">+ Sheets에서 추가</button>
    </div>`;
  document.getElementById('det').classList.add('open');
}

// ── TEMP FILTER ───────────────────────────────────────
function setCat(c){
  catFilter=c;
  document.querySelectorAll('.cchip').forEach(el=>el.classList.toggle('on',el.dataset.c===c));
  // 현재 레벨 재렌더
  const lv=level;
  if(lv==='root') spawnRoot();
  else if(lv.startsWith('cat_')) drillCat(lv.slice(4));
  else if(lv==='b2g_ministries') drillMinistries();
  else if(lv.startsWith('ministry_')) drillMinistry(lv.slice(9));
  else if(lv.startsWith('region_')) drillRegion(lv.slice(7));
  else if(lv.startsWith('sub_')){
    const sub=lv.slice(4);const reg=REGIONS.find(r=>r.subs.includes(sub));
    if(reg)drillSub(sub,reg.id);
  } else if(lv.startsWith('org_')) {
    const orgId=lv.slice(4);
    const catId=ALL_CONTACTS.find(c=>Object.entries(CONTACTS).find(([k,v])=>k===orgId&&v.includes(c)))?.[0]?.catId||'b2b';
    drillOrg(orgId,catId);
  }
}

// ── SEARCH ────────────────────────────────────────────
let sovHits=[],sovFocIdx=-1;
document.getElementById('msearch').addEventListener('focus',openSov);
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&!document.getElementById('sov').classList.contains('open')&&document.activeElement!==document.getElementById('msearch')){e.preventDefault();openSov();}
  if(e.key==='Escape')closeSov();
});
function openSov(){document.getElementById('sov').classList.add('open');setTimeout(()=>document.getElementById('sinp').focus(),30);doSOV();}
function closeSov(){document.getElementById('sov').classList.remove('open');document.getElementById('msearch').value='';}

function doSOV(){
  const q=document.getElementById('sinp').value.trim().toLowerCase();
  if(!q){document.getElementById('sres').innerHTML='<div class="sempty">이름, 기관, 지역, 전화번호, 담당자를 검색하세요</div>';sovHits=[];return;}

  const hits=[];
  // 담당자 검색
  Object.entries(CONTACTS).forEach(([parentId,cts])=>{
    const catId=cts[0]?.catId||'b2g';
    cts.forEach(c=>{
      if([c.name,c.title,c.phone,c.email,c.owner||'',c.memo||'',c.sns||'',...(c.touches||[]).map(t=>t.text)].join(' ').toLowerCase().includes(q)){
        const reg=REGIONS.find(r=>r.subs.includes(parentId));
        const min=MINISTRIES.find(m=>m.id===parentId);
        hits.push({type:'contact',label:c.name,sub:(reg?.name||min?.name||parentId)+' · '+c.title,c,parentId,regionId:reg?.id,catId});
      }
    });
  });
  // 지역 검색
  REGIONS.forEach(r=>{
    if(r.name.toLowerCase().includes(q)||r.short.toLowerCase().includes(q)) hits.push({type:'region',label:r.name,sub:'광역시도',r});
    r.subs.forEach(s=>{if(s.includes(q)) hits.push({type:'sub',label:s,sub:r.name,regionId:r.id,subName:s});});
  });
  MINISTRIES.forEach(m=>{if(m.name.toLowerCase().includes(q)) hits.push({type:'ministry',label:m.name,sub:'중앙부처',orgId:m.id});});

  sovHits=hits.slice(0,30);sovFocIdx=-1;renderSOV(q);
}
function renderSOV(q){
  const el=document.getElementById('sres');
  if(!sovHits.length){el.innerHTML='<div class="sempty">검색 결과 없음</div>';return;}
  const hl=t=>t.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark>${m}</mark>`);
  el.innerHTML=sovHits.map((h,i)=>{
    const tc=h.c?TC[h.c.temp]:'var(--b2g)';
    const catColor=h.catId?CAT_COLOR[h.catId]:'var(--b2g)';
    const BG={HOT:h2r('#ef4444',.18),WARM:h2r('#f59e0b',.16),COLD:h2r('#60a5fa',.16),DARK:h2r('#4b5563',.2),NONE:'rgba(37,45,58,.35)'};
    const bg=h.c?BG[h.c.temp]||BG.NONE:h2r(catColor,.15);
    return `<div class="si ${sovFocIdx===i?'foc':''}" onclick="pickSOV(${i})">
      <div class="si-av" style="background:${bg};color:${tc}">${h.label.slice(0,2)}</div>
      <div class="si-info">
        <div class="si-name">${hl(h.label)}${h.c?` <span style="font-size:9px;color:${tc};font-weight:700;margin-left:3px">${h.c.temp}</span>`:''}</div>
        <div class="si-meta">${h.sub}${h.c?.phone?' · '+hl(h.c.phone):''}${h.c?.owner?' · '+hl(h.c.owner):''}</div>
      </div>
      <div class="si-r" style="color:${catColor}">${h.catId?CAT_NAME[h.catId]:'B2G'}</div>
    </div>`;
  }).join('');
}
function pickSOV(i){
  const h=sovHits[i];if(!h)return;closeSov();
  if(h.type==='contact'){
    drillCat(h.catId);
    const go=()=>{
      if(h.regionId){drillRegion(h.regionId);setTimeout(()=>{drillSub(h.parentId,h.regionId);setTimeout(()=>openDet(h.c,h.parentId,h.catId),220);},220);}
      else if(MINISTRIES.find(m=>m.id===h.parentId)){drillMinistries();setTimeout(()=>{drillMinistry(h.parentId);setTimeout(()=>openDet(h.c,h.parentId,h.catId),220);},220);}
      else{drillOrg(h.parentId,h.catId);setTimeout(()=>openDet(h.c,h.parentId,h.catId),220);}
    };
    setTimeout(go,220);
  } else if(h.type==='sub'){drillCat('b2g');setTimeout(()=>{drillRegion(h.regionId);setTimeout(()=>drillSub(h.subName,h.regionId),220);},220);}
  else if(h.type==='region'){drillCat('b2g');setTimeout(()=>drillRegion(h.r.id),220);}
  else if(h.type==='ministry'){drillCat('b2g');setTimeout(()=>{drillMinistries();setTimeout(()=>drillMinistry(h.orgId),220);},220);}
}
function sovKey(e){
  if(e.key==='ArrowDown'){e.preventDefault();sovFocIdx=Math.min(sovFocIdx+1,sovHits.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();sovFocIdx=Math.max(sovFocIdx-1,0);}
  else if(e.key==='Enter'&&sovFocIdx>=0){pickSOV(sovFocIdx);return;}
  else if(e.key==='Escape'){closeSov();return;}
  document.querySelectorAll('.si').forEach((el,i)=>{el.classList.toggle('foc',i===sovFocIdx);if(i===sovFocIdx)el.scrollIntoView({block:'nearest'});});
}

// ── INIT ──────────────────────────────────────────────
async function syncAndRefresh(){
  const ok=await loadFromSheets();
  if(ok){
    setCat(catFilter);
    spawnRoot();
  }
}

window.addEventListener('resize',()=>{getSize();initGrid();setCat(catFilter);});
window.addEventListener('load',async()=>{
  getSize();initGrid();
  setBc([{label:'전체',fn:null}]);
  spawnRoot();startAnim();
  // Sheets에서 실데이터 로드 — 성공하면 자동 갱신
  const ok=await loadFromSheets();
  if(ok) spawnRoot();
});
</script>
